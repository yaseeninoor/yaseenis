<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaseenis | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Mukta+Malar:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Mukta Malar',sans-serif;
}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(6,78,59,.85),rgba(4,120,87,.90)),
url("https://images.unsplash.com/photo-1512632578888-169bbbc64f33?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
}
.login-card{
width:380px;
max-width:95%;
background:rgba(255,255,255,.95);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
animation:fade .6s;
}
@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:none;
}
}
.logo{
text-align:center;
font-size:38px;
font-weight:bold;
color:#065f46;
}
.logo span{
color:#D4AF37;
}
.arabic{
text-align:center;
font-family:'Amiri',serif;
font-size:26px;
margin:15px 0;
color:#065f46;
}
.subtitle{
text-align:center;
margin-bottom:30px;
color:#555;
}
.input{
margin-bottom:18px;
}
.input label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#065f46;
}
.input input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
outline:none;
transition:.3s;
}
.input input:focus{
border-color:#047857;
box-shadow:0 0 10px rgba(4,120,87,.2);
}
button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#047857,#065f46);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}
button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(4,120,87,.35);
}
.links{
display:flex;
justify-content:space-between;
margin-top:18px;
font-size:14px;
}
.links a{
text-decoration:none;
color:#047857;
font-weight:bold;
}
.footer{
margin-top:30px;
text-align:center;
font-size:13px;
color:#666;
}
.footer span{
color:#D4AF37;
font-weight:bold;
}
</style>
</head>
<body>
<div class="login-card">
<div class="logo">
Yaseenis<span>.</span>
</div>
<div class="arabic">
بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيم
</div>
<div class="subtitle">
பயனர் உள்நுழைவு
</div>
<form id="loginForm">
<div class="input">
<label>👤 Username</label>
<input type="text" id="username" placeholder="Enter Username" required>
</div>
<div class="input">
<label>🔒 Password</label>
<input type="password" id="password" placeholder="Enter Password" required>
</div>
<button type="submit">
Login →
</button>
</form>
<div class="links">
<a href="#">Forgot Password?</a>
<a href="#">Register</a>
</div>
<div class="footer">
© 2026 <span>Yaseenis Islamic Portal</span>
</div>
</div>
<script>
document.getElementById("loginForm").addEventListener("submit",function(e){
e.preventDefault();
const u=document.getElementById("username").value;
const p=document.getElementById("password").value;
if(u==="admin" && p==="123"){
alert("Login Successful");
// Redirect to portal page instead of going back home
window.location.href = "portal.html";
}else{
alert("Invalid Username or Password");
}
});
</script>
</body>
</html>
