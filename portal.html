<!-- [முந்தைய ஸ்டைல் மற்றும் ஹெடர் பகுதி அப்படியே இருக்கட்டும்] -->

    <div class="container" id="authScreen">
        <h2 id="authTitle">User Login</h2>
        <input type="email" id="emailInput" class="input-field" placeholder="Email">
        <input type="password" id="passwordInput" class="input-field" placeholder="Password">
        <button id="mainAuthBtn" class="action-btn">Login</button>
        <span class="toggle-link" id="toggleLink">Don't have an account? Register</span>
        <div id="errorMsg" style="color: red; margin-top: 10px; font-size: 14px;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA58LsyYjrJuZDChB9TaM5FUnHE-UMFl5o",
            authDomain: "yaseenis-user.firebaseapp.com",
            projectId: "yaseenis-user",
            storageBucket: "yaseenis-user.firebasestorage.app",
            messagingSenderId: "337971140829",
            appId: "1:337971140829:web:c30a126aac465ded12e334",
            measurementId: "G-SKRZ3TS7YR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLoginMode = true;
        const mainAuthBtn = document.getElementById("mainAuthBtn");
        const toggleLink = document.getElementById("toggleLink");
        const emailInput = document.getElementById("emailInput");
        const passwordInput = document.getElementById("passwordInput");
        const errorMsg = document.getElementById("errorMsg");

        toggleLink.onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById("authTitle").innerText = isLoginMode ? "User Login" : "Register";
            mainAuthBtn.innerText = isLoginMode ? "Login" : "Register";
            toggleLink.innerText = isLoginMode ? "Don't have an account? Register" : "Already have an account? Login";
            errorMsg.innerText = "";
        };

        mainAuthBtn.onclick = () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            
            // "Processing" என மாற்றுவதன் மூலம் பயனர் மீண்டும் கிளிக் செய்வதைத் தவிர்க்கலாம்
            mainAuthBtn.innerText = "Processing...";
            mainAuthBtn.disabled = true;

            if(isLoginMode) {
                signInWithEmailAndPassword(auth, email, password)
                    .catch(e => {
                        errorMsg.innerText = e.message;
                        mainAuthBtn.innerText = "Login";
                        mainAuthBtn.disabled = false;
                    });
            } else {
                createUserWithEmailAndPassword(auth, email, password)
                    .catch(e => {
                        errorMsg.innerText = e.message;
                        mainAuthBtn.innerText = "Register";
                        mainAuthBtn.disabled = false;
                    });
            }
        };

        // முக்கிய மாற்றம்: லாகின் வெற்றி பெற்றவுடன் தானாகவே மாறும்
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.replace("index.html"); // .href-க்கு பதில் .replace பயன்படுத்துவது சிறந்தது
            }
        });
    </script>
